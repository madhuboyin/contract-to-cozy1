# production-monitor.yaml - Single resource to monitor both applications

apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: production-app-monitor
  namespace: production
  labels:
    # CRITICAL: This label must match your Prometheus Helm release name
    release: prometheus 
spec:
  # Use matchExpressions for OR condition
  selector:
    matchExpressions:
    - key: app
      operator: In
      values: ['api', 'frontend', 'worker']

  # Define endpoints for each unique port found in the selected Pods
  podMetricsEndpoints:
  - port: "8080"          # Backend API
    path: /metrics
    interval: 15s
  - port: "3000"          # Frontend (Next.js)
    path: /metrics
    interval: 15s
  - port: "9091"          # Workers metrics server
    path: /metrics
    interval: 15s