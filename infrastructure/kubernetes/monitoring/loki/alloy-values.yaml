alloy:
  mode: daemonset

  extraEnv:
    - name: LOKI_USERNAME
      valueFrom:
        secretKeyRef:
          name: loki-basic-auth
          key: username
    - name: LOKI_PASSWORD
      valueFrom:
        secretKeyRef:
          name: loki-basic-auth
          key: password

  configMap:
    content: |
      // --------------------------------------------------
      // Loki write client (Basic Auth + OrgID)
      // --------------------------------------------------
      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"

          tenant_id = "production" // maps to X-Scope-OrgID

          basic_auth {
            username = env("LOKI_USERNAME")
            password = env("LOKI_PASSWORD")
          }
        }
      }

      // --------------------------------------------------
      // Faro receiver (browser telemetry from Next.js frontend)
      // --------------------------------------------------
      faro.receiver "frontend" {
        server {
          listen_address           = "0.0.0.0"
          listen_port              = 12347
          max_allowed_payload_size = "4MiB"
        }

        output {
          logs = [loki.write.loki.receiver]
        }
      }
