apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-security-auth
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  security-auth-observability.json: |
    {
      "id": null,
      "uid": "ctc-security-auth",
      "title": "Security - Auth and Scope",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["security", "auth", "mfa"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Token Replay Events (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "sum(increase(security_token_reuse_total[1h]))",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "MFA Failures (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "targets": [
            {
              "expr": "sum(increase(security_mfa_failures_total[1h]))",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Property Scope Denials (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(increase(security_property_scope_denials_total[1h]))",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "401 + 403 Denials (1h)",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "targets": [
            {
              "expr": "sum(increase(security_auth_denials_total{status_code=~\"401|403\"}[1h]))",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value"
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "401/403 Denials by Surface",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 5},
          "targets": [
            {
              "expr": "sum by (surface, status_code) (rate(security_auth_denials_total{status_code=~\"401|403\"}[5m]))",
              "legendFormat": "{{surface}} {{status_code}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Property Scope Denials by Source",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 5},
          "targets": [
            {
              "expr": "sum by (source) (rate(security_property_scope_denials_total[5m]))",
              "legendFormat": "{{source}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "MFA Failures by Stage/Reason",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 13},
          "targets": [
            {
              "expr": "sum by (stage, reason) (rate(security_mfa_failures_total[5m]))",
              "legendFormat": "{{stage}} {{reason}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Token Replay Rate by Surface",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 13},
          "targets": [
            {
              "expr": "sum by (surface) (rate(security_token_reuse_total[5m]))",
              "legendFormat": "{{surface}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
