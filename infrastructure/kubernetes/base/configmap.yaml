apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
data:
  # Application
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  
  # API Configuration
  API_PORT: "8080"
  API_HOST: "0.0.0.0"
  
  # Frontend Configuration
  NEXT_PUBLIC_API_URL: "https://api.contracttocozy.com"
  NEXT_PUBLIC_FARO_URL: "/api/faro/collect"

  # CORS — comma-separated list of origins the backend will accept requests from.
  # Add staging/preview domains here as needed.
  ALLOWED_ORIGINS: "https://contracttocozy.com,https://www.contracttocozy.com,https://docs.contracttocozy.com"

  # Gemini / AI
  GEMINI_CHAT_ENABLED: "true"
  GEMINI_MODEL: "gemini-2.0-flash"

  # Room scan
  ROOM_SCAN_PROVIDER: "gemini"
  ROOM_SCAN_GEMINI_DEBUG: "false"
  INVENTORY_ROOM_SCAN_AUTOSELECT_THRESHOLD: "0.72"
  INVENTORY_ROOM_SCAN_STORE_AI_RAW: "false"
  INVENTORY_ROOM_SCAN_DUPLICATE_THRESHOLD: "0.92"

  # Community events (workers)
  TICKETMASTER_MAX_PAGES: "3"
  EVENTS_RADIUS_MILES: "15"
  EVENTS_STALE_DAYS: "2"

  # Home events auto-generation
  HOME_EVENTS_AUTOGEN: "true"

  # Database Configuration (non-sensitive)
  DB_HOST: "postgres.production.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "contracttocozy"
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  
  # Loki (pino-loki direct push)
  LOKI_HOST: "http://loki-gateway.monitoring.svc.cluster.local"

  # Redis Configuration
  REDIS_HOST: "redis.production.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Application Features
  ENABLE_SIGNUP: "true"
  ENABLE_REVIEWS: "true"
  ENABLE_CHAT: "true"
  
  # Rate Limiting
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  
  # Session Configuration
  SESSION_TIMEOUT_MINUTES: "60"
  
  # Email Configuration (non-sensitive)
  EMAIL_FROM: "noreply@contracttocozy.com"
  EMAIL_REPLY_TO: "support@contracttocozy.com"
