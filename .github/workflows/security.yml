name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 08:00 UTC — catches newly-disclosed CVEs
    # in unchanged deps between code pushes
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  audit-backend:
    name: Audit backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      # --ignore-scripts prevents malicious postinstall hooks from running in CI
      - run: npm ci --ignore-scripts

      # Enforce SSRF guard usage for backend fetch() call sites
      - run: npm run lint:ssrf

      # Fails the job on any high or critical severity vulnerability
      - run: npm audit --audit-level=high

  audit-workers:
    name: Audit workers
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/workers/package-lock.json

      - run: npm ci --ignore-scripts

      - run: npm audit --audit-level=high

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so TruffleHog can scan every commit
          fetch-depth: 0

      - name: Run TruffleHog
        # Pinned to v3.94.3 — update SHA when upgrading the action version.
        # Using a commit SHA instead of a mutable tag prevents supply-chain
        # compromise via tag mutation.
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6
        with:
          # Scan the entire git history of this branch
          base: ""
          head: HEAD
          extra_args: --only-verified

  audit-frontend:
    name: Audit frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - run: npm ci --ignore-scripts

      # audit-ci is used here instead of plain `npm audit` because Next.js 14
      # has known HIGH advisories with no v14 patch available (fix = Next.js 15+
      # upgrade, tracked separately). The allowlist in .audit-ci.json names every
      # bypassed advisory ID explicitly — any new HIGH not in that list still
      # fails this job. Remove entries from .audit-ci.json as advisories are fixed.
      - run: npx audit-ci --config .audit-ci.json
